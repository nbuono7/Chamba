<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChamBA — Iniciar sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #1D9E75; --teal-dark: #0F6E56; --teal-light: #E1F5EE; --teal-mid: #5DCAA5;
      --bg: #f4f5f4; --card: #fff; --text: #111; --text-mid: #555; --text-soft: #999; --border: #e5e7eb;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 64px; background: #fff; border-bottom: 1px solid var(--border); }
    .nav-logo { font-size: 20px; font-weight: 600; text-decoration: none; color: var(--text); }
    .nav-logo span { color: var(--teal); }
    .nav-link { font-size: 14px; color: var(--text-mid); text-decoration: none; }
    .nav-link:hover { color: var(--teal); }

    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 36px; width: 100%; max-width: 420px; }
    .login-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .login-sub { font-size: 14px; color: var(--text-mid); margin-bottom: 28px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-mid); margin-bottom: 5px; }
    .form-group input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; font-size: 14px; font-family: inherit; color: var(--text); background: #fff; transition: border-color 0.15s; }
    .form-group input:focus { outline: none; border-color: var(--teal); }

    .btn-submit { width: 100%; background: var(--teal); color: #fff; border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 4px; transition: background 0.15s; }
    .btn-submit:hover { background: var(--teal-dark); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .error-box { background: #fdeaea; border: 1px solid #f09595; border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #a32d2d; margin-bottom: 16px; display: none; }
    .divider { text-align: center; font-size: 13px; color: var(--text-soft); margin: 20px 0; }
    .link-reg { text-align: center; font-size: 14px; color: var(--text-mid); margin-top: 16px; }
    .link-reg a { color: var(--teal); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">Cham<span>BA</span></a>
  <a class="nav-link" href="/registro">Crear cuenta →</a>
</nav>
<div class="page">
  <div class="login-card">
    <div class="login-title">Bienvenido de vuelta</div>
    <div class="login-sub">Ingresá con tu cuenta de ChamBA</div>
    <div class="error-box" id="error-box"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="f-email" placeholder="juan@gmail.com"/>
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="f-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()">Ingresar</button>
    <div class="link-reg">¿No tenés cuenta? <a href="/registro">Registrate acá</a></div>
  </div>
</div>
<script>
const BACKEND = 'https://chamba-production-0c2d.up.railway.app';
async function doLogin() {
  const btn = document.getElementById('btn-login');
  const errorBox = document.getElementById('error-box');
  errorBox.style.display = 'none';
  const email = document.getElementById('f-email').value.trim();
  const password = document.getElementById('f-pass').value;
  if (!email || !password) return showError('Completá todos los campos.');
  btn.disabled = true; btn.textContent = 'Ingresando...';
  try {
    const r = await fetch(`${BACKEND}/api/usuarios/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await r.json();
    if (!r.ok) return showError(data.error || 'Error al ingresar.');
    localStorage.setItem('chamba_user', JSON.stringify(data.usuario));
    window.location.href = data.usuario.tipo === 'socio' ? '/panel-socio' : '/panel-cliente';
  } catch(e) { showError('No se pudo conectar. Intentá de nuevo.'); }
  finally { btn.disabled = false; btn.textContent = 'Ingresar'; }
}
function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg; box.style.display = 'block';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = 'Ingresar';
}
</script>
</body>
</html>
